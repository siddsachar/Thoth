name: CI — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── Install Ollama ────────────────────────────────────────────────
      - name: Install Ollama
        run: |
          brew install ollama
          ollama serve &
          sleep 5
          ollama pull qwen3:1.7b

      # ── Python dependencies ───────────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── Run test suite ────────────────────────────────────────────────
      - name: Run test suite
        run: python test_suite.py

  # ═══════════════════════════════════════════════════════════════════
  #  Build macOS release zip (only on main branch pushes)
  # ═══════════════════════════════════════════════════════════════════
  build-mac-release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build macOS release zip
        run: |
          chmod +x installer/build_mac_release.sh
          OUTPUT_DIR="${{ github.workspace }}" ./installer/build_mac_release.sh 3.4.0

      - name: Upload macOS zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thoth-3.4.0-macOS
          path: ${{ github.workspace }}/Thoth-3.4.0-macOS.zip
          retention-days: 30
